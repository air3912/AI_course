services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_NAME: ${APP_NAME:-Knowledge Network API}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/app.db}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/data/raw_uploads}
      PARSED_DIR: ${PARSED_DIR:-/app/data/parsed}
      GRAPH_DIR: ${GRAPH_DIR:-/app/data/graphs}
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
